<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYKIM'S PORTFOLIO</title>
    <link rel="shortcut icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/mobile.css"> <!-- ip16pm (440*956)-->
    <link rel="stylesheet" href="css/tablet.css"> <!-- ipad 10.9 (1180*820) -->
</head>
<body>
    <!-- overlay menu + hamburger menu -->
    <header class="cd-header">
        <div class="header-wrapper">
            <!-- hamburger menu -->
            <div class="nav-but-wrap">
                <div class="menu-icon hover-target">
                    <span class="menu-icon_line menu-icon_line-left"></span>
                    <span class="menu-icon_line"></span>
                    <span class="menu-icon_line menu-icon_line-right"></span>
                </div>
            </div>
            <!-- hamburger menu end -->
        </div>
    </header>

    <!-- overlay menu -->
    <div class="nav">
        <div class="nav_content">
            <ul class="nav_list">
                <li class="nav_list-item"><a href="#home" class="hover-target">HOME</a></li>
                <li class="nav_list-item"><a href="#about" class="hover-target">ABOUT ME</a></li>
                <li class="nav_list-item"><a href="#story" class="hover-target">STORY</a></li>
                <li class="nav_list-item"><a href="#works" class="hover-target">WORKS</a></li>
                <li class="nav_list-item"><a href="#resume" class="hover-target">RESUME</a></li>
                <li class="nav_list-item"><a href="#contact" class="hover-target">CONTACT</a></li>
            </ul>
        </div>
    </div>

    <!-- mouse cursor -->
    <div class='cursor' id="cursor"></div>
    <div class='cursor2' id="cursor2"></div>
    <div class='cursor3' id="cursor3"></div>
    <!-- overlay menu + logo + hamburger menu end -->

    <section id="home"></section>
    <section id="about"></section>
    <section id="story"></section>
    <section id="works"></section>
    <section id="resume"></section>
    <section id="contact"></section>
</body>
</html>
